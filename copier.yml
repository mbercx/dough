_subdirectory: copier-template
_templates_suffix: .jinja
_answers_file: .copier-answers.dough.yml
_message_after_copy: |

  ✨ Dough scaffolding added. Run `hatch test` to verify.

package_name:
  type: str
  help: Python package name (derived from the target directory).
  default: "{{ _folder_name | lower | replace('-', '_') }}"
  when: false

_tasks:
  - >-
    copier copy --trust --defaults --vcs-ref=HEAD
    --exclude 'tests/**'
    --data 'docs=mkdocs'
    --data 'doc_deploy=github'
    --data 'type_check=strict'
    --data 'coverage=codecov'
    https://github.com/mbercx/python-copier .
  - "uv add --quiet 'dough[pint]>=0.4,<0.5'"
  - "uv add --quiet --optional tests pytest-regressions"

_exclude:
  - "{% if _copier_operation == 'update' -%}tests/conftest.py{% endif %}"
  - "{% if _copier_operation == 'update' -%}tests/outputs/fixtures{% endif %}"
  - "{% if _copier_operation == 'update' -%}tests/outputs/test_demo_output{% endif %}"
  - "{% if _copier_operation == 'update' -%}src/{{ package_name }}/outputs/demo.py{% endif %}"
  - "{% if _copier_operation == 'update' -%}src/{{ package_name }}/outputs/parsers/json_parser.py{% endif %}"
  - "{% if _copier_operation == 'update' -%}tests/outputs/test_demo_output.py{% endif %}"
  - "{% if _copier_operation == 'update' -%}tests/outputs/parsers/test_json_parser.py{% endif %}"
